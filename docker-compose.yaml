version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: event-booking-backend
    depends_on:
      - mysql
    restart: always
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  mysql-data:
